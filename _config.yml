# ======================================================================
#  Micro — a Jekyll theme inspired by microsiervos.com
#  Main site configuration
# ======================================================================

# --- Site identity ------------------------------------------------------
title:        joscandreu
tagline:      Technology, science, internet and curiosities
description: >-
  A minimalist blog about technology, science, internet and curiosities.
author:       José Carlos Andreu Galán
email:        joscandreu@gmail.com
lang:         en

# Base URL. For a project GitHub Pages site use baseurl: "/repo-name".
# For a user/organization page or a custom domain, leave it empty.
url:          "https://joscandreu.com"
baseurl:      ""

# --- Social links (shown in the sidebar and the footer) ----------------
# Fully configurable list: add, remove or reorder the links.
# Each entry needs 'name' (link text) and 'url' (destination).
# To hide all social links, leave the list empty: social: []
social:
  - name: Twitter / X
    url: https://x.com/joscandreu
  - name: Mastodon
    url: https://mastodon.social/@username
  - name: GitHub
    url: https://github.com/joscandreu
# Also show a link to the RSS feed next to the social links
show_rss: true

# --- Comments (optional, disabled by default) --------------------------
# provider: "" | "giscus" | "disqus"
comments:
  provider: ""
  # giscus config (https://giscus.app)
  giscus:
    repo: ""
    repo_id: ""
    category: ""
    category_id: ""
  # Disqus config
  disqus:
    shortname: ""

# --- Analytics (optional) ----------------------------------------------
google_analytics: ""   # e.g. "G-XXXXXXXXXX"

# --- Pagination (jekyll-paginate v1, GitHub Pages compatible) ----------
paginate:       10
paginate_path:  "/page/:num/"

# --- Build --------------------------------------------------------------
markdown:       kramdown
highlighter:    rouge
permalink:      /:categories/:title/
timezone:       Europe/London

# Posts are shown IN FULL in listings (home, sections). To trim a long
# post and show only the beginning + a "Read more" link, add <!--more-->
# at the cut point.
excerpt_separator: "<!--more-->"

# Max number of related posts shown after each post. Related posts are
# ranked by how many tags they share with the current post (more shared
# tags rank higher); the section is hidden when there is no tag overlap.
related_posts_limit: 5

kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# --- Plugins (ALL allowed on GitHub Pages) -----------------------------
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# --- Front matter defaults ---------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "José Carlos Andreu Galán"
      comments: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# --- Exclude from the build --------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - node_modules
  - .github
  - .sass-cache

# --- Feed (jekyll-feed) -------------------------------------------------
feed:
  path: feed.xml

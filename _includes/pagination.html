{% if paginator.total_pages > 1 %}
<nav class="pagination" aria-label="Pagination">
  {% if paginator.previous_page %}
    <a class="page-prev" href="{{ paginator.previous_page_path | relative_url }}">← Newer</a>
  {% else %}
    <span class="page-prev disabled">← Newer</span>
  {% endif %}

  <span class="page-info">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>

  {% if paginator.next_page %}
    <a class="page-next" href="{{ paginator.next_page_path | relative_url }}">Older →</a>
  {% else %}
    <span class="page-next disabled">Older →</span>
  {% endif %}
</nav>
{% endif %}
